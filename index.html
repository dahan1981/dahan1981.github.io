<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YourBrand</title>

  <!-- ✅ Google Analytics — troque G-XXXXXXXXXX pelo seu ID real -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0f;
      --card: #16161a;
      --border: rgba(255,255,255,0.08);
      --border-h: rgba(255,255,255,0.18);
      --text: #e8e8ed;
      --muted: #6e6e7a;
      --accent: #d4a96a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background glows */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(212,169,106,0.07) 0%, transparent 70%);
      top: -100px; right: -100px;
      border-radius: 50%;
      animation: drift 10s ease-in-out infinite alternate;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,106,245,0.05) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      border-radius: 50%;
      animation: drift 13s ease-in-out infinite alternate-reverse;
      pointer-events: none;
    }
    @keyframes drift {
      from { transform: translate(0,0); }
      to { transform: translate(30px, -30px); }
    }

    /* Main card */
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(212,169,106,0.4), rgba(124,106,245,0.4));
      border: 1.5px solid var(--border-h);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 20px;
    }

    /* Name */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 8px;
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    /* Bio */
    .bio {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Links */
    .links { display: flex; flex-direction: column; gap: 12px; }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 500;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212,169,106,0.06), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .link-btn:hover {
      border-color: var(--border-h);
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .link-btn:hover::before { opacity: 1; }

    .link-btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: #1a1200;
      font-weight: 600;
    }
    .link-btn.primary::before { background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); }
    .link-btn.primary:hover { background: #e8c27a; box-shadow: 0 16px 48px rgba(212,169,106,0.25); }

    .link-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .link-btn.primary .link-icon { background: rgba(0,0,0,0.12); }
    .link-btn:not(.primary) .link-icon { background: rgba(255,255,255,0.05); }

    .link-label { flex: 1; text-align: left; }
    .link-arrow { font-size: 0.85rem; opacity: 0.5; transition: transform 0.2s; }
    .link-btn:hover .link-arrow { transform: translateX(3px); opacity: 0.9; }

    /* Footer */
    .footer {
      margin-top: 32px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .footer span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar">◆</div>

    <h1>Your<em>Brand</em></h1>
    <p class="bio">Tecnologia & estratégia digital.<br>Transformando ideias em produtos reais.</p>

    <div class="links">

      <a href="https://seusite.com.br" target="_blank" class="link-btn primary" onclick="gtag('event', 'click', {event_category: 'link', event_label: 'Site'})">
        <div class="link-icon">🌐</div>
        <span class="link-label">Acesse o site</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://threads.net/@seuuser" target="_blank" class="link-btn" onclick="gtag('event', 'click', {event_category: 'link', event_label: 'Threads'})">
        <div class="link-icon">𝕋</div>
        <span class="link-label">Threads</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://instagram.com/seuuser" target="_blank" class="link-btn" onclick="gtag('event', 'click', {event_category: 'link', event_label: 'Instagram'})">
        <div class="link-icon">📸</div>
        <span class="link-label">Instagram</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://youtube.com/@seuuser" target="_blank" class="link-btn" onclick="gtag('event', 'click', {event_category: 'link', event_label: 'YouTube'})">
        <div class="link-icon">▶</div>
        <span class="link-label">YouTube</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://tiktok.com/@seuuser" target="_blank" class="link-btn" onclick="gtag('event', 'click', {event_category: 'link', event_label: 'TikTok'})">
        <div class="link-icon">♪</div>
        <span class="link-label">TikTok</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://wa.me/5521999999999" target="_blank" class="link-btn" onclick="gtag('event', 'click', {event_category: 'link', event_label: 'WhatsApp'})">
        <div class="link-icon">💬</div>
        <span class="link-label">WhatsApp</span>
        <span class="link-arrow">→</span>
      </a>

    </div>

    <p class="footer">feito com <span>♥</span> por YourBrand</p>
  </div>
</body>
</html>
